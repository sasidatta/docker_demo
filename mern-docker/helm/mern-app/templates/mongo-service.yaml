apiVersion: v1
kind: Service
metadata:
  name: {{ include "mern-app.mongo.fullname" . }}
  labels:
    {{- include "mern-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: mongo
spec:
  selector:
    app: {{ include "mern-app.mongo.fullname" . }}
  ports:
    - port: {{ .Values.mongo.service.port }}
      targetPort: {{ .Values.mongo.service.port }}
