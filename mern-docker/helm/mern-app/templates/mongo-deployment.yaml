apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mern-app.mongo.fullname" . }}
  labels:
    {{- include "mern-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: mongo
spec:
  selector:
    matchLabels:
      app: {{ include "mern-app.mongo.fullname" . }}
  template:
    metadata:
      labels:
        app: {{ include "mern-app.mongo.fullname" . }}
        app.kubernetes.io/component: mongo
    spec:
      containers:
        - name: mongo
          image: "{{ .Values.mongo.image.repository }}:{{ .Values.mongo.image.tag }}"
          imagePullPolicy: {{ .Values.mongo.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - containerPort: {{ .Values.mongo.service.port }}
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "mern-app.mongo.secretName" . }}
                  key: MONGO_INITDB_ROOT_USERNAME
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "mern-app.mongo.secretName" . }}
                  key: MONGO_INITDB_ROOT_PASSWORD
          volumeMounts:
            - name: mongo-storage
              mountPath: /data/db
          resources:
            {{- toYaml .Values.mongo.resources | nindent 12 }}
      volumes:
        - name: mongo-storage
          persistentVolumeClaim:
            claimName: {{ include "mern-app.mongo.fullname" . }}-pvc
