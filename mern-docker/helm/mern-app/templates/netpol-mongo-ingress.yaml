{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "mern-app.fullname" . }}-mongo-ingress
  labels:
    {{- include "mern-app.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: {{ include "mern-app.mongo.fullname" . }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: {{ include "mern-app.backend.fullname" . }}
      ports:
        - protocol: TCP
          port: {{ .Values.mongo.service.port }}
{{- end }}
