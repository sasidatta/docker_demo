{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "mern-app.fullname" . }}-frontend-ingress
  labels:
    {{- include "mern-app.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: {{ include "mern-app.frontend.fullname" . }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.ingressNginxNamespace }}
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 80
{{- end }}
