# ---------------------------------------------------------
# Secrets for sensitive information like passwords
# ---------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: mern-secrets
  namespace: k8s-lab
type: Opaque
data:
  # All values must be Base64 encoded for Secrets
  # password123 -> cGFzc3dvcmQxMjM=
  # mongo-user  -> bW9uZ28tdXNlcg==

  MONGO_ROOT_PASSWORD: cGFzc3dvcmQxMjM=
  MONGO_USER: bW9uZ28tdXNlcg==
  MONGO_PASSWORD: cGFzc3dvcmQxMjM=
