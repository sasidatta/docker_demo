# ---------------------------------------------------------
# Frontend Deployment: Running the React (Nginx) application
# ---------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: k8s-lab
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: sasidatta/mern-docker-frontend:5bcc1d2968da5af161d3e975e211c2749acb9145
        ports:
        - containerPort: 80 # Nginx default port
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "128Mi"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
        # nodeSelector:
        #   kubernetes.io/hostname: master-1 # Optional: schedule on specific node
